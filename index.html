<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👕 Wardrobe Builder</title>
  <style>
    :root {
      --bg: #f4f6f8; --card: #fff; --primary: #4a90e2; --text: #2c3e50;
      --border: #d1d5db; --hover: #e2e8f0; --shadow: 0 4px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { text-align: center; margin-bottom: 24px; }
    h1 { margin: 0; font-size: 2rem; }
    .layout { display: grid; grid-template-columns: 320px 1fr; gap: 24px; }
    .sidebar, .workspace-wrapper { background: var(--card); border-radius: 12px; padding: 16px; box-shadow: var(--shadow); }
    
    .upload-zone {
      border: 2px dashed var(--border); border-radius: 10px; padding: 30px; text-align: center;
      cursor: pointer; transition: 0.2s; margin-bottom: 16px;
    }
    .upload-zone:hover, .upload-zone.dragover { border-color: var(--primary); background: #f0f7ff; }
    .upload-zone input { display: none; }
    .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-height: 400px; overflow-y: auto; padding: 4px; }
    .gallery img { width: 100%; aspect-ratio: 3/4; object-fit: contain; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; background: #fafafa; }
    .gallery img:hover { border-color: var(--primary); transform: scale(1.03); }
    
    .workspace { position: relative; width: 100%; height: 600px; background: #fafafa; border: 2px solid var(--border); border-radius: 10px; overflow: hidden; }
    .layer { position: absolute; width: 220px; cursor: grab; user-select: none; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); transition: outline 0.1s; }
    .layer:active { cursor: grabbing; }
    .layer.selected { outline: 3px solid var(--primary); outline-offset: 4px; }
    
    .toolbar { display: flex; gap: 8px; margin-top: 12px; justify-content: center; }
    button { padding: 8px 14px; border: none; border-radius: 6px; background: var(--hover); cursor: pointer; font-weight: 500; transition: 0.2s; }
    button:hover { background: #cbd5e1; }
    button.primary { background: var(--primary); color: #fff; }
    button.danger { background: #ef4444; color: #fff; }
    
    .loader { display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.8); align-items: center; justify-content: center; font-size: 1.2rem; color: var(--primary); z-index: 10; border-radius: 10px; }
    .hint { margin-top: 8px; font-size: 0.85rem; color: #6b7280; text-align: center; }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .workspace { height: 500px; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>👕 Конструктор образов</h1>
      <p>Загрузи одежду → собери лук → экспериментируй</p>
    </header>

    <div class="layout">
      <!-- Панель загрузки и галерея -->
      <div class="sidebar">
        <div class="upload-zone" id="dropZone">
          <input type="file" id="fileInput" accept="image/*">
          📤 Перетащи фото или кликни для выбора
        </div>
        <h3>👚 Гардероб</h3>
        <div class="gallery" id="gallery"></div>
      </div>

      <!-- Рабочая область -->
      <div class="workspace-wrapper">
        <div class="workspace" id="workspace">
          <div class="loader" id="loader">⏳ Обработка фона...</div>
        </div>
        <div class="toolbar">
          <button onclick="layerAction('up')">⬆️ Выше</button>
          <button onclick="layerAction('down')">⬇️ Ниже</button>
          <button class="danger" onclick="layerAction('delete')">🗑 Удалить</button>
          <button onclick="layerAction('clear')">🧹 Очистить</button>
        </div>
        <div class="hint">Клик по фото в галерее добавляет его. Перетаскивай мышкой. Клик по элементу выделяет его для управления.</div>
      </div>
    </div>
  </div>

  <script>
    const gallery = document.getElementById('gallery');
    const workspace = document.getElementById('workspace');
    const loader = document.getElementById('loader');
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    let layers = []; // { id, el, x, y }
    let selectedId = null;
    let isDragging = false;
    let dragOffset = { x: 0, y: 0 };

    // Загрузка
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault(); dropZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', e => { if (e.target.files[0]) uploadFile(e.target.files[0]); });

    function uploadFile(file) {
      const formData = new FormData();
      formData.append('image', file);
      loader.style.display = 'flex';

      fetch('/upload', { method: 'POST', body: formData })
        .then(res => res.json())
        .then(data => {
          loader.style.display = 'none';
          if (data.error) return alert(data.error);
          const img = document.createElement('img');
          img.src = data.url;
          img.onclick = () => addToWorkspace(data.url);
          gallery.prepend(img);
        })
        .catch(() => { loader.style.display = 'none'; alert('Ошибка сети'); });
    }

    function addToWorkspace(url) {
      const id = crypto.randomUUID();
      const img = document.createElement('img');
      img.src = url; img.className = 'layer'; img.id = id;
      img.style.left = '50%'; img.style.top = '50%'; img.style.transform = 'translate(-50%, -50%)';
      workspace.appendChild(img);
      layers.push({ id, el: img });
      selectLayer(id);
      enableDrag(img);
    }

    function selectLayer(id) {
      layers.forEach(l => l.el.classList.toggle('selected', l.id === id));
      selectedId = id;
    }

    workspace.addEventListener('mousedown', e => {
      const target = e.target.closest('.layer');
      if (!target) return selectLayer(null);
      selectLayer(target.id);
      isDragging = true;
      const rect = workspace.getBoundingClientRect();
      const style = window.getComputedStyle(target);
      dragOffset.x = e.clientX - parseFloat(style.left) - rect.left;
      dragOffset.y = e.clientY - parseFloat(style.top) - rect.top;
      e.preventDefault();
    });

    window.addEventListener('mousemove', e => {
      if (!isDragging || !selectedId) return;
      const layer = layers.find(l => l.id === selectedId);
      if (!layer) return;
      const rect = workspace.getBoundingClientRect();
      let x = e.clientX - dragOffset.x - rect.left;
      let y = e.clientY - dragOffset.y - rect.top;
      // Ограничения в пределах рабочей области
      const maxW = rect.width - layer.el.offsetWidth / 2;
      const maxH = rect.height - layer.el.offsetHeight / 2;
      x = Math.max(layer.el.offsetWidth / 2, Math.min(maxW, x));
      y = Math.max(layer.el.offsetHeight / 2, Math.min(maxH, y));
      layer.el.style.left = x + 'px'; layer.el.style.top = y + 'px';
      layer.el.style.transform = 'none';
    });

    window.addEventListener('mouseup', () => isDragging = false);

    function layerAction(action) {
      if (!selectedId) return;
      const layer = layers.find(l => l.id === selectedId);
      if (!layer) return;

      if (action === 'up') {
        let z = parseInt(layer.el.style.zIndex || 0);
        layer.el.style.zIndex = z + 1;
      } else if (action === 'down') {
        let z = parseInt(layer.el.style.zIndex || 0);
        layer.el.style.zIndex = Math.max(0, z - 1);
      } else if (action === 'delete') {
        layer.el.remove();
        layers = layers.filter(l => l.id !== selectedId);
        selectedId = null;
      } else if (action === 'clear') {
        layers.forEach(l => l.el.remove());
        layers = []; selectedId = null;
      }
    }

    workspace.addEventListener('click', e => {
      if (!e.target.closest('.layer')) selectLayer(null);
    });
  </script>
</body>
</html>
